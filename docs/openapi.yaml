openapi: 3.1.0
info:
  title: Devin Task Board API
  version: 0.1.0
  description: タスク管理アプリ（Jira ミニ版）の REST API 仕様

servers:
  - url: http://localhost:3000
    description: ローカル開発

security:
  - session: []

paths:
  # ── Auth ────────────────────────────────────────
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: サインアップ
      operationId: signup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: アカウント作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: メールアドレス重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: パスワードリセット
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: リセットメール送信完了
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── Projects ────────────────────────────────────
  /api/projects:
    get:
      tags: [Projects]
      summary: プロジェクト一覧
      operationId: listProjects
      responses:
        "200":
          description: プロジェクト一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Projects]
      summary: プロジェクト作成
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: プロジェクト作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Projects]
      summary: プロジェクト詳細
      operationId: getProject
      responses:
        "200":
          description: プロジェクト詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Projects]
      summary: プロジェクト更新
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Projects]
      summary: プロジェクト削除
      operationId: deleteProject
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Project Members ─────────────────────────────
  /api/projects/{id}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Project Members]
      summary: メンバー一覧
      operationId: listProjectMembers
      responses:
        "200":
          description: メンバー一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Project Members]
      summary: メンバー招待
      operationId: inviteProjectMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: 招待成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{id}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/MemberId"

    patch:
      tags: [Project Members]
      summary: 権限変更
      operationId: updateMemberRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/ProjectMemberRole"
      responses:
        "200":
          description: 権限変更成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Project Members]
      summary: メンバー削除
      operationId: removeMember
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Tasks ───────────────────────────────────────
  /api/projects/{id}/tasks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Tasks]
      summary: タスク一覧
      operationId: listTasks
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/TaskPriority"
        - name: assigneeId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: タスク一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTasksResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Tasks]
      summary: タスク作成
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: タスク作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      tags: [Tasks]
      summary: タスク詳細
      operationId: getTask
      responses:
        "200":
          description: タスク詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Tasks]
      summary: タスク更新
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Tasks]
      summary: タスク削除
      operationId: deleteTask
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}/status:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    patch:
      tags: [Tasks]
      summary: ステータス変更（D&D用）
      operationId: updateTaskStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: ステータス変更成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}/sort:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    patch:
      tags: [Tasks]
      summary: 並び順変更（D&D用）
      operationId: updateTaskSort
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sortOrder]
              properties:
                sortOrder:
                  type: integer
                status:
                  $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: 並び順変更成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Subtasks ────────────────────────────────────
  /api/tasks/{taskId}/subtasks:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      tags: [Tasks]
      summary: サブタスク一覧
      operationId: listSubtasks
      responses:
        "200":
          description: サブタスク一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Tasks]
      summary: サブタスク作成
      operationId: createSubtask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: サブタスク作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Comments ────────────────────────────────────
  /api/tasks/{taskId}/comments:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      tags: [Comments]
      summary: コメント一覧
      operationId: listComments
      responses:
        "200":
          description: コメント一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Comments]
      summary: コメント投稿
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: コメント投稿成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/CommentId"

    patch:
      tags: [Comments]
      summary: コメント編集
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "200":
          description: 編集成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Comments]
      summary: コメント削除
      operationId: deleteComment
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Categories ──────────────────────────────────
  /api/projects/{id}/categories:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Categories]
      summary: カテゴリ一覧
      operationId: listCategories
      responses:
        "200":
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Categories]
      summary: カテゴリ作成
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: カテゴリ作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/categories/{categoryId}:
    parameters:
      - $ref: "#/components/parameters/CategoryId"

    patch:
      tags: [Categories]
      summary: カテゴリ更新
      operationId: updateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Categories]
      summary: カテゴリ削除
      operationId: deleteCategory
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Attachments ─────────────────────────────────
  /api/tasks/{taskId}/attachments:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    post:
      tags: [Attachments]
      summary: ファイルアップロード
      operationId: uploadAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "対応形式: jpg, png, gif, webp, pdf, txt, doc, docx, xls, xlsx（上限10MB）"
      responses:
        "201":
          description: アップロード成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/attachments/{attachmentId}:
    parameters:
      - $ref: "#/components/parameters/AttachmentId"

    delete:
      tags: [Attachments]
      summary: ファイル削除
      operationId: deleteAttachment
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Search ──────────────────────────────────────
  /api/search:
    get:
      tags: [Search]
      summary: グローバル検索
      operationId: globalSearch
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: 検索クエリ（タスクタイトル、説明、番号、コメント）
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/TaskPriority"
        - name: assigneeId
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - name: dueDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dueDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 検索結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Activity ────────────────────────────────────
  /api/tasks/{taskId}/activities:
    parameters:
      - $ref: "#/components/parameters/TaskId"

    get:
      tags: [Activity]
      summary: タスクのアクティビティ
      operationId: listTaskActivities
      responses:
        "200":
          description: アクティビティ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLog"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{id}/activities:
    parameters:
      - $ref: "#/components/parameters/ProjectId"

    get:
      tags: [Activity]
      summary: プロジェクトのアクティビティ
      operationId: listProjectActivities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: アクティビティ一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedActivityLogsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Notifications ───────────────────────────────
  /api/notifications:
    get:
      tags: [Notifications]
      summary: 通知一覧
      operationId: listNotifications
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 通知一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNotificationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/notifications/{notificationId}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationId"

    patch:
      tags: [Notifications]
      summary: 既読マーク
      operationId: markNotificationRead
      responses:
        "200":
          description: 既読マーク成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: 一括既読
      operationId: markAllNotificationsRead
      responses:
        "200":
          description: 一括既読成功
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Dashboard ───────────────────────────────────
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: ダッシュボードデータ
      operationId: getDashboard
      responses:
        "200":
          description: ダッシュボードデータ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Admin ───────────────────────────────────────
  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: 監査ログ一覧
      operationId: listAuditLogs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 監査ログ一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAuditLogsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Users ───────────────────────────────────────
  /api/users/me:
    get:
      tags: [Users]
      summary: 自分のプロフィール
      operationId: getMyProfile
      responses:
        "200":
          description: プロフィール
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [Users]
      summary: プロフィール更新
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

# ════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════
components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Auth.js v5 セッション Cookie

  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: プロジェクト ID（cuid）

    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: タスク ID（cuid）

    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
      description: プロジェクトメンバー ID（cuid）

    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
      description: コメント ID（cuid）

    CategoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
      description: カテゴリ ID（cuid）

    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
      description: 添付ファイル ID（cuid）

    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
      description: 通知 ID（cuid）

  schemas:
    # ── Enums ───────────────────────────────────
    UserRole:
      type: string
      enum: [ADMIN, MEMBER]

    Theme:
      type: string
      enum: [LIGHT, DARK, SYSTEM]

    ProjectMemberRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]

    TaskStatus:
      type: string
      enum: [BACKLOG, TODO, IN_PROGRESS, IN_REVIEW, DONE]

    TaskPriority:
      type: string
      enum: [URGENT, HIGH, MEDIUM, LOW, NONE]

    ActivityAction:
      type: string
      enum: [CREATED, UPDATED, DELETED, STATUS_CHANGED, ASSIGNED, COMMENTED, ATTACHED]

    NotificationType:
      type: string
      enum: [TASK_ASSIGNED, TASK_COMMENTED, TASK_STATUS_CHANGED, TASK_DUE_SOON, MENTIONED]

    # ── Models ──────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        locale:
          type: string
        theme:
          $ref: "#/components/schemas/Theme"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        key:
          type: string
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
        role:
          $ref: "#/components/schemas/ProjectMemberRole"
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
        taskNumber:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        projectId:
          type: string
        assigneeId:
          type: string
          nullable: true
        reporterId:
          type: string
        parentTaskId:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        actualHours:
          type: number
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskDetail:
      allOf:
        - $ref: "#/components/schemas/Task"
        - type: object
          properties:
            assignee:
              $ref: "#/components/schemas/User"
              nullable: true
            reporter:
              $ref: "#/components/schemas/User"
            categories:
              type: array
              items:
                $ref: "#/components/schemas/Category"
            subTasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
          description: OKLCH カラー値
        projectId:
          type: string

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
          description: Markdown 対応
        taskId:
          type: string
        authorId:
          type: string
        author:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        id:
          type: string
        fileName:
          type: string
        fileUrl:
          type: string
        fileSize:
          type: integer
          description: バイト数
        mimeType:
          type: string
        taskId:
          type: string
        uploaderId:
          type: string
        createdAt:
          type: string
          format: date-time

    ActivityLog:
      type: object
      properties:
        id:
          type: string
        action:
          $ref: "#/components/schemas/ActivityAction"
        entityType:
          type: string
        entityId:
          type: string
        userId:
          type: string
        projectId:
          type: string
        oldValue: {}
        newValue: {}
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        userId:
          type: string
        linkUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        userId:
          type: string
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        resource:
          type: string
        resourceId:
          type: string
        details: {}
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # ── Requests ────────────────────────────────
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true

    InviteMemberRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/ProjectMemberRole"

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assigneeId:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        categoryIds:
          type: array
          items:
            type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assigneeId:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        estimatedHours:
          type: number
          nullable: true
        actualHours:
          type: number
          nullable: true
        categoryIds:
          type: array
          items:
            type: string

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    CreateCategoryRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          description: OKLCH カラー値

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        avatarUrl:
          type: string
          nullable: true
        locale:
          type: string
          enum: [ja, en]
        theme:
          $ref: "#/components/schemas/Theme"

    # ── Responses ───────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    UserResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    ProjectResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Project"

    ProjectMemberResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ProjectMember"

    TaskResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TaskDetail"

    PaginatedTasksResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CommentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Comment"

    CategoryResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Category"

    AttachmentResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Attachment"

    NotificationResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Notification"

    PaginatedNotificationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedActivityLogsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedAuditLogsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        pagination:
          $ref: "#/components/schemas/Pagination"

    DashboardResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            summary:
              type: object
              properties:
                totalTasks:
                  type: integer
                completedTasks:
                  type: integer
                inProgressTasks:
                  type: integer
                overdueTasks:
                  type: integer
            statusBreakdown:
              type: array
              items:
                type: object
                properties:
                  status:
                    $ref: "#/components/schemas/TaskStatus"
                  count:
                    type: integer
            priorityBreakdown:
              type: array
              items:
                type: object
                properties:
                  priority:
                    $ref: "#/components/schemas/TaskPriority"
                  count:
                    type: integer
            completionTrend:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                  count:
                    type: integer
            myTasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"
            upcomingTasks:
              type: array
              items:
                $ref: "#/components/schemas/Task"
            recentActivities:
              type: array
              items:
                $ref: "#/components/schemas/ActivityLog"

  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: VALIDATION_ERROR
              message: タイトルは必須です

    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: 認証が必要です

    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: この操作を実行する権限がありません

    NotFound:
      description: リソース未発見
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: リソースが見つかりません
